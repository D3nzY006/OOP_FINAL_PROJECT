<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SurveyPro | Login</title>
  <style>
    /* RESET & BASE STYLES */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f0f2f5; /* Light grey background from your image */
      color: #334155;
      line-height: 1.6;
    }

    /* NAVIGATION */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
    }

.hero-logo{
  height:200px;
  margin-left: 85px;
  margin-bottom:25px;
}

    .logo span {
      color: #1b5e20;
    }

    .nav-links {
      display: flex;
      gap: 14px;
      list-style: none;
    }

    .nav-links a {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 8px;
      background: #1b5e20;
      text-decoration: none;
      color: #ffffff;
      font-weight: 700;
      font-size: 15px;
      transition: background-color 0.2s ease;
    }

    .nav-links a:hover {
      background: #1b5e20;
    }

    /* HERO SECTION */
    .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 80px 8%;
      max-width: 1200px;
      margin: 0 auto;
      gap: 40px;
    }

    .hero-text {
      flex: 1;
    }

    .hero-text h1 {
      font-size: 3rem;
      color: #1b5e20 ; /* Emerald green from your first request */
      margin-bottom: 20px;
    }

    .hero-text p {
      font-size: 1.2rem;
      color: #475569;
      margin-bottom: 30px;
    }

    .learn-more-btn {
      display: inline-block;
      padding: 12px 30px;
      background: #1b5e20;
      color: #ffffff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.4px;
      transition: background-color 0.2s ease;
    }

    .learn-more-btn:hover {
      background: #1b5e20;
    }

    /* THE LOGIN CARD (Directly from your screenshot) */
    .login-card {
      background-color: #ffffff;
      width: 100%;
      max-width: 400px;
      padding: 40px;
      border-radius: 24px; /* Soft rounded corners */
      box-shadow: 0 10px 25px rgba(27, 94, 32, 0.2);
      text-align: center;
    }

    .login-card h2 {
      font-size: 28px;
      color: #333;
      margin-bottom: 30px;
      font-weight: 500;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
      color: #444;
    }

    .form-group input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background-color: #e8f0fe; /* Light blueish tint from your screenshot */
      font-size: 16px;
    }

    .password-field {
      position: relative;
    }

    /* THE LOGIN BUTTON */
    .login-btn {
      width: 100%;
      padding: 14px;
      background-color: #1b5e20; /* Specific green from your image */
      color: white;
      border: none;
      border-radius: 30px; /* Pill shape from your image */
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s;
    }

    .login-btn:hover {
      background-color: #1b5e20;
    }

    /* REGISTER LINK */
    .register-text {
      margin-top: 25px;
      font-size: 15px;
      color: #1b5e20;
    }

    .register-text span {
      color: #5c8cb8;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .container {
        flex-direction: column;
        text-align: center;
      }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">SURVEY<span>PRO</span></div>
    <ul class="nav-links">
      <li><a href="{% url 'my_account' %}">Account</a></li>
      <li><a href="{% url 'analytics_dashboard' %}">Analytics</a></li>
      <li><a href="{% url 'qr_code' %}">QR-code</a></li>
    </ul>
    <div style="width: 100px;"></div> </nav>

  <div class="container">
    
    <div class="hero-text">
  <img src="{% static 'logo.art.png' %}" alt="Survey Logo" class="hero-logo">
  <h1>ONLINE SURVEY</h1>

      <p>Welcome to our feedback survey platform. Share your thoughts and help us improve. Your input is valuable in shaping better services.</p>
      <a href="{% url 'learn_more' %}" class="learn-more-btn">LEARN MORE</a>
    </div>

    <div class="login-card">
      <h2>Login</h2>
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label>Username:</label>
          <input type="text" name="username" placeholder="Username">
        </div>
        <div class="form-group">
          <label>Password:</label>
          <div class="password-field">
            <input id="password" type="password" name="password" placeholder="Password">
          </div>
        </div>
        <button type="submit" class="login-btn">Login</button>
      </form>
      <div class="register-text">
        
        Create an account? <a href="{% url 'register' %}" class="register-link">Register</a>
      </div>
    </div>

  </div>

  <script>
    // Password toggle functionality removed - no toggle button present
  </script>

</body>
</html>
